name: Build VS Code

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'extensions/**'
      - 'build/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target'
        required: true
        default: 'compile'
        type: choice
        options:
          - compile
          - compile-web
          - compile-client

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxkbfile-dev \
            libsecret-1-dev \
            libgtk-3-dev \
            libnotify-dev \
            libnss3-dev \
            libkrb5-dev
      
      - name: Install dependencies
        run: yarn install --immutable --network-timeout 180000
      
      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: |
            out/
            .build/
          key: ${{ runner.os }}-build-${{ hashFiles('yarn.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-${{ hashFiles('yarn.lock') }}-
            ${{ runner.os }}-build-
      
      - name: Build (compile)
        if: github.event.inputs.target == 'compile' || github.event.inputs.target == ''
        run: yarn gulp compile
        env:
          NODE_OPTIONS: --max-old-space-size=8192
      
      - name: Build (compile-web)
        if: github.event.inputs.target == 'compile-web'
        run: yarn gulp compile-web
        env:
          NODE_OPTIONS: --max-old-space-size=8192
      
      - name: Build (compile-client)
        if: github.event.inputs.target == 'compile-client'
        run: yarn gulp compile-client
        env:
          NODE_OPTIONS: --max-old-space-size=8192
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-build-${{ github.sha }}
          path: |
            out/
            !out/**/*.map
          retention-days: 7
          compression-level: 6
      
      - name: Upload source maps
        uses: actions/upload-artifact@v7
        with:
          name: vscode-sourcemaps-${{ github.sha }}
          path: out/**/*.map
          retention-days: 3

  build-web:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --immutable --network-timeout 180000
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: vscode-build-${{ github.sha }}
          path: out/
      
      - name: Build web version
        run: yarn gulp compile-web
        env:
          NODE_OPTIONS: --max-old-space-size=8192
      
      - name: Upload web build
        uses: actions/upload-artifact@v7
        with:
          name: vscode-web-${{ github.sha }}
          path: out-vscode-web/
          retention-days: 7

  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --immutable --network-timeout 180000
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: vscode-build-${{ github.sha }}
          path: out/
      
      - name: Run unit tests
        run: yarn test-node
        continue-on-error: true