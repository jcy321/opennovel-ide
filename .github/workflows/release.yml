name: Release Build

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: false

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact: vscode-linux-x64
          - os: macos-latest
            artifact: vscode-darwin-x64
          - os: windows-latest
            artifact: vscode-win32-x64
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
      
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbfile-dev libsecret-1-dev \
            libgtk-3-dev libnotify-dev libnss3-dev libkrb5-dev
      
      - name: Install dependencies
        run: yarn install --immutable --network-timeout 300000
      
      - name: Build
        run: yarn gulp compile
        env:
          NODE_OPTIONS: --max-old-space-size=8192
      
      - name: Package VS Code
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            yarn gulp vscode-linux-x64
          elif [ "$RUNNER_OS" = "macOS" ]; then
            yarn gulp vscode-darwin-x64
          elif [ "$RUNNER_OS" = "Windows" ]; then
            yarn gulp vscode-win32-x64
          fi
        shell: bash
        env:
          NODE_OPTIONS: --max-old-space-size=8192
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            .build/linux/*.tar.gz
            .build/darwin/*.zip
            .build/win32/*.zip
          retention-days: 30

  create-release:
    runs-on: ubuntu-latest
    needs: build-release
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Create release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'release'
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}